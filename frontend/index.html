<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Manager - AWS Project</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Inventory Manager</h1>
      <p>Cloud Computing Project - AWS Dual Architecture</p>
    </header>

    <div class="api-selector">
      <label for="api-select">API Source:</label>
      <select id="api-select">
        <option value="">-- Select API Source --</option>
        <option value="lambda">Lambda (from config)</option>
        <option value="ecs">ECS (from config)</option>
        <option value="manual">Manual URL</option>
      </select>
      <input type="text" id="custom-api-url" placeholder="Custom API URL (for manual mode)">
      <button onclick="setApiUrl()">Set API</button>
      <button onclick="testHealth()">Test Health</button>
    </div>

    <div class="api-info" id="api-source-info">
      <svg class="info-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>
      <span id="api-source-label">Active API: Not set</span>
    </div>

    <div id="snackbar" class="snackbar"></div>

    <main>
      <section class="form-section">
        <h2>Create New Item</h2>
        <form id="create-form" onsubmit="createItem(event)">
          <div class="form-group">
            <label>ID *</label>
            <input type="text" id="item-id" required>
          </div>
          <div class="form-group">
            <label>Name *</label>
            <input type="text" id="item-name" required>
          </div>
          <div class="form-group">
            <label>Quantity *</label>
            <input type="number" id="item-quantity" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="item-description">
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" id="item-category">
          </div>
          <div class="form-group">
            <label>Unit Value</label>
            <input type="number" step="0.01" id="item-unit-value">
          </div>
          <button type="submit">Create Item</button>
        </form>
      </section>

      <section class="items-section">
        <div class="section-header">
          <h2>Items List</h2>
          <button onclick="loadItems()">🔄 Refresh</button>
        </div>
        <div id="items-container"></div>
      </section>
    </main>
  </div>

  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeEditModal()">&times;</span>
      <h2>Edit Item</h2>
      <form id="edit-form" onsubmit="updateItem(event)">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" id="edit-name" required>
        </div>
        <div class="form-group">
          <label>Quantity *</label>
          <input type="number" id="edit-quantity" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="edit-description">
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="edit-category">
        </div>
        <div class="form-group">
          <label>Unit Value</label>
          <input type="number" step="0.01" id="edit-unit-value">
        </div>
        <button type="submit">Update Item</button>
        <button type="button" onclick="closeEditModal()">Cancel</button>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="delete-modal" class="modal">
    <div class="modal-content delete-modal-content">
      <h3>Confirm Deletion</h3>
      <p>Are you sure you want to delete this item?</p>
      <p class="item-preview" id="delete-item-preview"></p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-delete" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
